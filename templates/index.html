<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Дачные поселки</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
        }
        h1 {
            color: #333;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            background: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
        .btn-orange {
            background: #e65100;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏡 Дачные поселки</h1>
        <p>«Заповедное» и «Колосок»</p>
        <a href="/zapovednoe" class="btn">🌳 Заповедное</a>
        <a href="/kolosok" class="btn btn-orange">🌾 Колосок</a>
    </div>
</body>
</html>
